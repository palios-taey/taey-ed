screen_type: EXERCISE_DROPDOWN
classify: >
  AXComboBox "Select an answer" present among the ANSWER WIDGETS (question
  area, not chrome — "View progress"/"Share with..."/"Sort by:" popups are
  chrome). One combobox per blank/row; inline fill-blank sentences or table
  rows. 2-5 dropdowns is normal variation — count the visible boxes, same recipe.
recipe:                              # The boxes are IDENTICAL by name ("Select an
  # answer") and the name never changes (only the value does) — so name/value
  # CANNOT distinguish them, and a whole-list element find returns 0 mid-render.
  # Distinguish them
  # by POSITION: read each AXComboBox's visible_bbox from the tree, sort
  # top-to-bottom. The preceding sentence ("amplitude" / "wavelength") is the
  # text anchor for which answer goes in which box. Open each box with click_at
  # at its bbox CENTRE (POINTS = visible_bbox space), then click the answer in
  # the opened menu. Per box, top-to-bottom:
  - wait 2.0                         # settle after the transition
  - send_to_llm:                     # answers from the SCREENSHOT (diagram +
      question_type: solve_complex   # sentences). One answer per blank, in
      question: >                    # top-to-bottom order (Blank 0 = top box).
        <quote each blank's full sentence VERBATIM, top-to-bottom; read the
         diagram/image; return the chosen value per blank>
      store: answers
  - per box, top-to-bottom (UNROLL; read visible_bbox=[x,y,w,h] from the tree):
      click_at: {x: <bbox_x + bbox_w/2>, y: <bbox_y + bbox_h/2>}   # open THIS box
      wait_for_element: {role: AXMenuItem}
      find_and_click: {target: <this box's answer>, role: AXMenuItem, strategy: mouse_click, match_mode: exact}
      then wait 1.0
  - find_and_click: {target: Check, role: AXButton, strategy: mouse_click, match_mode: exact, post_delay: 2.5}
behavior_tree_template:              # EMIT THIS. Distinguish identical boxes by
  # POSITION via click_at on each box's visible_bbox centre (read [x,y,w,h] from
  # the tree, sort by y top->bottom; box0 = top). Then click the answer option in
  # the opened menu. UNROLL one block per visible box (this shows 2; emit N).
  # Fill the click_at x/y from each box's bbox, the send_to_llm question, and
  # each box's answer into its find_and_click target.
  type: sequence
  name: exercise_dropdown
  children:
    - {type: action, action: wait, params: {seconds: 2.0}}
    - {type: action, action: send_to_llm,
       params: {question_type: solve_complex,
                question: "<quote each blank's sentence VERBATIM top-to-bottom; read the wave diagram; return the chosen value for Blank 0 (top box) then Blank 1 (lower box)>"},
       store: answers}
    # --- BOX 0 (TOP — smallest visible_bbox y). x,y = its bbox centre. ---
    - {type: action, action: click_at, params: {x: "<box0 bbox_x + w/2>", y: "<box0 bbox_y + h/2>"}}
    - {type: action, action: wait_for_element, params: {role: AXMenuItem}}
    - {type: action, action: find_and_click, params: {target: "<answer for Blank 0>", role: AXMenuItem, strategy: mouse_click, match_mode: exact}}
    - {type: action, action: wait, params: {seconds: 1.0}}
    # --- BOX 1 (LOWER — larger visible_bbox y). x,y = its bbox centre. ---
    - {type: action, action: click_at, params: {x: "<box1 bbox_x + w/2>", y: "<box1 bbox_y + h/2>"}}
    - {type: action, action: wait_for_element, params: {role: AXMenuItem}}
    - {type: action, action: find_and_click, params: {target: "<answer for Blank 1>", role: AXMenuItem, strategy: mouse_click, match_mode: exact}}
    - {type: action, action: wait, params: {seconds: 1.0}}
    - {type: action, action: find_and_click,
       params: {target: Check, role: AXButton, strategy: mouse_click, match_mode: exact, post_delay: 2.5}}
contracts:
  - the two boxes are IDENTICAL by name; distinguish ONLY by position (bbox y),
    top-to-bottom. NEVER target by name (hits the first box twice).
  - click_at uses the box's visible_bbox CENTRE (POINTS, same space as bbox).
  - enumerated AXMenuItem element refs must NEVER enter send_to_llm params
    (crashes JSON serialization Mac-side).
  - multi-system questions (gravity AND electric, "each system"): one vision
    call PER SYSTEM/region — a single multi-blob call cross-bleeds context
actuation:
  strategy: click_at the box's bbox-centre to open it, then find_and_click the
    answer in the opened menu (role=AXMenuItem, mouse_click, exact). Settle 2.0s
    before the first open, 1.0s between boxes.
verification:
  - after each box: its AXComboBox value flips from "Select an answer" to the
    chosen value before moving to the next box
  - same-skeleton after Check = wrong answer or nothing staged — never success
completion:
  - post-answer popover with "Next question" = advance
failure_modes:
  - wrong answer -> FULL STOP, escalate (R3)
  - menu_items_seen=[] -> fired too early; settle longer, re-open once
  - submit renamed "Check again" after a platform reset — exact-match the name
    in the CURRENT tree
  - NO scroll phase: dropdowns are ELEMENT-based; a scroll-only BT changes
    nothing and trips stuck-detection
  - targeting by name (not position) -> both selects hit box 0; use click_at by
    bbox position
