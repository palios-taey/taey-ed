screen_type: EXERCISE_DROPDOWN
classify: >
  AXComboBox "Select an answer" present among the ANSWER WIDGETS (question
  area, not chrome — "View progress"/"Share with..."/"Sort by:" popups are
  chrome). One combobox per blank/row.
recipe:
  - wait 2.0                       # menus render lazily after transitions
  - for each row, in order:
      select_dropdown_option:      # opens, verifies, commits — the ONLY way
        target: "Select an answer" # or the row's current value on revisit
        option: <chosen for THIS row>
      then wait 1.0
  - wait 1.5                       # Check enable race
  - find_and_click: {target: Check, role: AXButton, strategy: mouse_click}
contracts:
  - options come from the menu enumeration; chosen option text VERBATIM
    (suffixes like "not selected" are display noise the handler strips)
actuation:
  strategy: select_dropdown_option only — click_at on triggers is BANNED;
    find_all(AXMenuItem) refs must NEVER enter send_to_llm params
  settle: 2.0s before first open; 1.0s between rows
verification:
  - handler verifies per-row (menu_closed + value committed)
  - same-skeleton after Check = wrong answer or nothing staged — never success
completion:
  - post-answer popover with "Next question" = advance
failure_modes:
  - menu_items_seen=[] -> fired too early; settle longer, retry once
  - submit renamed "Check again" after a Try-again reset — exact-match the
    name found in the CURRENT tree
