screen_type: NAVIGATION
classify: >
  Content-list pages: course overview (units grid + mastery %), unit page
  (lessons with completed/proficient/mastered markers), lesson list. 15+
  AXLinks, no answer widgets, no player. LLM-DRIVEN by ruling (Jesse
  2026-05-19): never replace the navigate call with server-side rule resolvers.
recipe:                              # THE type-BT — the PROVEN pre-rebuild pattern.
  # NO custom `question`: passing one routes the server into a different prompt
  # branch and the LLM returns topic-word FRAGMENTS ("Forces"/"Waves") instead
  # of full link names (live RCA 2026-06-12 — my recipe regressed this). The
  # default NAVIGATE_PROMPT already picks the FIRST INCOMPLETE item (it reads
  # completion markers) and returns the exact DESCRIPTION text, so $nav.answer
  # is the full AXLink name and the exact-match click lands.
  - find_all: {role: AXLink, store: links}
  - send_to_llm:
      question_type: navigate
      items: $links
      store: nav
  - find_and_click:
      target: $nav.answer
      role: AXLink
      strategy: mouse_click
      match_mode: exact
      post_delay: 3.0
contracts:
  - CLICK BY TEXT ($nav.answer), NOT element ref (live RCA 2026-06-12): the
    Mac strips native AXUIElementRef via _json_sanitize before send_to_llm, so
    the server NEVER receives item elements and answer_element is ALWAYS None —
    element=$nav.answer_element gives an empty click. The server instead
    promotes $nav.answer to the EXACT matched description (= the AXLink name),
    so target=$nav.answer + match_mode exact is the reliable path.
  - the LLM may return a fragment ("Waves"); the server's exact+substring
    match_to_option promotes it to the full link name before returning answer
  - NEVER hardcode link text — names change between units/courses
actuation:
  strategy: mouse_click on AXLink; post_delay 3.0 (SPA load)
verification:
  - tree/URL changes to a content screen (VIDEO/ARTICLE/EXERCISE/deeper list)
completion:
  - n/a — navigation succeeds when it lands on the next incomplete content
failure_modes:
  - exact-name click returns None when a status suffix is a separate child
    text node: fall back to ELEMENT REF — match the LLM's answer to the
    find_all item server-side and click $links[i].element directly (no text
    re-search, and never a substring match)
  - whole unit mastered ("Great work!" banner): navigate to the next
    unfamiliar/started UNIT via the left rail or the banner's suggestion
  - tests are sequential and high-stakes (wrong answers level skills DOWN, no
    going back) — "Take unit test to level up!" is marketing, not an ordering
    instruction
