screen_type: NAVIGATION
classify: >
  Content-list pages: course overview (units grid + mastery %), unit page
  (lessons with completed/proficient/mastered markers), lesson list. 15+
  AXLinks, no answer widgets, no player. LLM-DRIVEN by ruling (Jesse
  2026-05-19): never replace the navigate call with server-side rule resolvers.
recipe:                              # THE type-BT — intelligence steps embedded
  - find_all: {role: AXLink, store: links}
  - send_to_llm:
      question_type: navigate
      items: $links
      question: >                    # vc=13 rule — NEVER let the LLM pick
        Identify the user's NEXT progress item: the FIRST item that is NOT      # blindly from all links: without
        completed/proficient/mastered. Markers mean done; "Take quiz again"     # this question it picked an
        means done (a re-do, never click). Prefer un-completed VIDEOS and       # already-watched intro video
        ARTICLES before any Quiz/Unit test/Course challenge — enter a test
        ONLY when no other incomplete content remains in this unit.
        Return EXACTLY ONE of the provided link names VERBATIM.
      store: nav
  - find_and_click:
      element: $nav.answer_element   # CLICK BY ELEMENT REF — the navigate
      strategy: mouse_click          # handler matches the LLM's pick back to
      post_delay: 3.0                # the find_all item and returns its stable
                                     # element; text-match ($nav.answer) is
                                     # fragile (status suffixes are separate
                                     # child nodes) and crashed live 2026-06-12.
contracts:
  - CLICK BY ELEMENT, NOT TEXT (live RCA 2026-06-12): the server navigate
    handler returns answer_element (it matches the LLM pick — even a stripped
    fragment like "Waves" — back to the find_all item via exact+substring).
    The BT MUST use element=$nav.answer_element; target=$nav.answer crashes
    ('NoneType not subscriptable') when the answer is a fragment or empty.
  - the LLM may return a fragment; the server's match_to_option recovers the
    element, so the recipe does NOT depend on a verbatim answer
  - NEVER hardcode link text — names change between units/courses
actuation:
  strategy: mouse_click on AXLink; post_delay 3.0 (SPA load)
verification:
  - tree/URL changes to a content screen (VIDEO/ARTICLE/EXERCISE/deeper list)
completion:
  - n/a — navigation succeeds when it lands on the next incomplete content
failure_modes:
  - exact-name click returns None when a status suffix is a separate child
    text node: fall back to ELEMENT REF — match the LLM's answer to the
    find_all item server-side and click $links[i].element directly (no text
    re-search, and never a substring match)
  - whole unit mastered ("Great work!" banner): navigate to the next
    unfamiliar/started UNIT via the left rail or the banner's suggestion
  - tests are sequential and high-stakes (wrong answers level skills DOWN, no
    going back) — "Take unit test to level up!" is marketing, not an ordering
    instruction
