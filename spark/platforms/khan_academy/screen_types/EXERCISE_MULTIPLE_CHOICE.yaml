screen_type: EXERCISE_MULTIPLE_CHOICE
classify: >
  "(Choice X)"-prefixed AXCheckBox rows among the ANSWER WIDGETS, and the
  question does NOT say "Select all that apply" / "Choose N answers" (single
  answer). Khan renders single-answer choices as AXCheckBox, NOT AXRadioButton
  — the tree's AXRadioButtons are browser chrome. Classify from the CURRENT
  widgets, never page history: the same hash hosts different types on revisit.
recipe:                              # DIRECT-SOLVE (Supervisor decision 2026-06-15): READ the
  # question + all "(Choice X)" choices FROM THE SCREENSHOT, determine the ONE correct answer,
  # click it. find_all->send_to_llm is intentionally NOT forced (find_all->options 422s on the
  # raw AXUIElementRef; kb_chunks=0 adds no grounding). REQUIRED = the choice click + Check + store_qa.
  - find_and_click:                  # the ONE correct choice
      target: <the correct "(Choice X) <full answer>" checkbox label, copied VERBATIM from screen>
      role: AXCheckBox               # never "Draw on exercise"; if it is already selected, skip
      strategy: mouse_click          # this click (re-click toggles OFF) and go straight to Check.
      match_mode: exact
  - wait 1.5                         # Check-enable race: React re-render gates the button
  - wait_for_element: {target: Check, role: AXButton, max_wait: 3.0}
  - find_and_click: {target: Check, role: AXButton, strategy: mouse_click, match_mode: exact, post_delay: 2.5}
  - store_qa: {question: <the question, read from the screenshot>, answer: <the chosen choice>, question_type: solve_choice}
contracts:
  - DIRECT-SOLVE: the worker reads the question + choices from the screenshot, determines the
    ONE correct answer, and clicks it. No find_all / send_to_llm required (find_all->options
    422s; kb_chunks=0 here). The click target is the EXACT "(Choice X) <full answer>" AX name,
    VERBATIM (match_mode exact) — never a bare letter, never "Draw on exercise".
actuation:
  strategy: mouse_click ALWAYS — focus_space silently no-ops on Chrome web
    widgets (proven live 2026-06-11)
  settle: 1.5s after last choice click; post-Check 2.5s
verification:
  - read the SCREENSHOT before clicking — choices TOGGLE; if the intended answer
    is already selected, click Check ONLY (re-clicking deselects)
  - Check still disabled (gray) after the choice click = nothing staged — the BT
    accomplished nothing regardless of tree movement
  - "Not quite" / red feedback after Check = WRONG ANSWER regardless of movement
completion:
  - "Next question" / "Show summary" AXButton = correct, advance
failure_modes:
  - wrong answer -> FULL STOP, escalate (R3). Never re-pick, never resubmit.
    Submit renames "Check"->"Try again" in wrong-answer state — that is a state
    SIGNAL, not an affordance to click.
  - image-bearing question (AXImage in question area, or text references
    image/figure/diagram/graph/"before and after"/"each system"): use
    question_type solve_complex with explicit instruction to DESCRIBE each image
    before answering; if the figure exceeds the viewport, scroll +
    need_screenshot extra frames and pass ALL frames (multi-image solve_complex)
  - restrictive extract filters (parent_contains) return nothing — min_length only
  - choice + AXTextArea combo (reflection): solve_choice with has_text_field=true,
    add find_and_type for the text area after the choice click
