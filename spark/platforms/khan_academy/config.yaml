platform: khan_academy
version: "14.0"

# REFERENCE ONLY — not used for screen matching.
# Screen matching is vector-only (Weaviate ScreenEmbedding).
# These screen definitions exist as documentation of known BT patterns
# for when consultations teach new screens to the vector store.
#
# Navigation, exercises, quizzes, feedback — all handled by LLM intelligence.
# Only video and article have deterministic BTs worth documenting here.

screens:

  # ═══════════════════════════════════════════════════════════
  # VIDEO SCREENS — three states, same for every video everywhere
  # ═══════════════════════════════════════════════════════════

  VIDEO_COMPLETE:
    description: >
      TRANSITION — Video done (sidebar shows "completed Video" for current item).
      Close modal and return to unit page. Checked FIRST (higher marker count).
      DO NOT click "Up next" — uses mastery-adaptive routing that skips content.
    markers:
      - text: "completed Video"
        match: contains
      - text: "Transcript"
        match: contains
      - text: "Play"
    tree:
      type: sequence
      children:
        - type: action
          action: press_key
          params:
            key: Escape
        - type: action
          action: wait
          params:
            seconds: 2.0

  VIDEO_PLAYING:
    description: >
      CONTENT — Video is currently playing (Pause button visible).
      video_poll sleeps 30s, returns continue_loop. Pipeline re-captures
      tree on each loop. When video ends, server Step 2.7 detects tree
      change and navigates forward automatically.
    markers:
      - text: "Pause"
        match: contains
      - text: "Transcript"
        match: contains
    tree:
      type: action
      action: video_poll

  VIDEO_UNSTARTED:
    description: >
      CONTENT — Video player visible, Play button present, not yet started.
      Click Play to begin, then pipeline re-captures and matches VIDEO_PLAYING.
      Negative marker: only matches if sidebar does NOT show "completed Video"
      (prevents replaying completed videos).
    markers:
      - text: "Play"
      - text: "Transcript"
        match: contains
      - text: "completed Video"
        match: contains
        present: false
    tree:
      type: sequence
      children:
        - type: action
          action: find_and_click
          params:
            target: "Play"
            role: AXButton
            strategy: mouse_click
            match_mode: contains
            post_delay: 3.0

  # ═══════════════════════════════════════════════════════════
  # ARTICLE — opened as modal from unit page
  # ═══════════════════════════════════════════════════════════

  ARTICLE_CONTENT:
    description: >
      CONTENT — Article opened as modal. Opening = completion on KA.
      Extract content, then close modal and return to unit/course page.
      DO NOT click "Up next" — uses mastery-adaptive routing that skips content.
    markers:
      - text: "Up next"
        match: contains
      - text: "Transcript"
        match: contains
        present: false
    extract:
      scope: webarea
      text:
        - role: AXStaticText
          text: true
    tree:
      type: sequence
      children:
        - type: action
          action: press_key
          params:
            key: Escape
        - type: action
          action: wait
          params:
            seconds: 2.0

  # ═══════════════════════════════════════════════════════════
  # ALL OTHER SCREENS → LLM intelligence
  # ═══════════════════════════════════════════════════════════
  # Navigation, exercises, quizzes, feedback screens are NOT mapped here.
  # They are handled by:
  #   - Step 5 navigation auto-detect (≥5 links → LLM picks next item)
  #   - Consultation flow (unknown screens → LLM generates BT)
